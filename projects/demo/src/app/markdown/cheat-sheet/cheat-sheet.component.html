<h1>Cheatsheet</h1>
<p>
  The following examples are intended as a quick markdown reference and showcase. Some of the examples are based on
  <a href="https://github.com/adam-p/markdown-here/wiki/Markdown-Cheatsheet" target="_blank" rel="noopener"
    >Adam Pritchard's Markdown Cheat Sheet</a
  >.
</p>

@for (item of titles; track item) {
  <details class="cheat-item" (toggle)="onToggle(item, $event)">
    <summary>{{ item }}</summary>
    <div class="cheat-body">
      <textarea
        [ngModel]="contents()[item].markdown"
        (ngModelChange)="onEdit(item, $event)"
        spellcheck="false"
        aria-label="Markdown source"
      ></textarea>
      <nge-markdown [data]="contents()[item].markdown" />
    </div>
  </details>
}
