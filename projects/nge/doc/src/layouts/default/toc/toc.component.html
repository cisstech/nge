@if (renderer().headings().length) {
  <nav class="toc" [attr.aria-label]="labels.tableOfContents">
    <div class="toc-label">{{ labels.tableOfContents }}</div>
    <ul>
      @for (heading of renderer().headings(); track heading.id) {
        <li>
          <a
            [attr.href]="'#' + heading.id"
            [class.active]="renderer().activeHeadingId() === heading.id"
            [class.sub]="heading.level >= 3"
            (click)="onSelect($event, heading.id)"
          >
            {{ heading.label }}
          </a>
        </li>
      }
    </ul>
    <button type="button" class="toc-top" (click)="scrollToTop()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="12" y1="19" x2="12" y2="5" />
        <polyline points="5 12 12 5 19 12" />
      </svg>
      <span>{{ labels.backToTop }}</span>
    </button>
  </nav>
}
