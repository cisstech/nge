<div class="palette" (keydown)="onKeydown($event)">
  <div class="palette-input">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
      <circle cx="11" cy="11" r="8" />
      <line x1="21" y1="21" x2="16.65" y2="16.65" />
    </svg>
    <input
      #input
      type="text"
      autocomplete="off"
      spellcheck="false"
      [attr.placeholder]="labels.search"
      [attr.aria-label]="labels.search"
      [value]="query()"
      (input)="onInput(input.value)"
    />
    <button type="button" class="kbd" (click)="dismiss()">Esc</button>
  </div>

  <div class="palette-results" role="listbox">
    @if (query() && !results().length) {
      <div class="palette-empty">{{ labels.searchEmpty }} “{{ query() }}”</div>
    }
    @for (result of results(); track result.link.href; let i = $index) {
      <button
        type="button"
        role="option"
        class="palette-item"
        [class.active]="i === activeIndex()"
        [attr.aria-selected]="i === activeIndex()"
        (click)="select(result)"
        (mouseenter)="activeIndex.set(i)"
      >
        <span class="palette-item-title">{{ result.title }}</span>
        @if (result.path.length) {
          <span class="palette-item-path">{{ result.path.join(' › ') }}</span>
        }
      </button>
    }
  </div>
</div>
