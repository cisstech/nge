<nav class="nav">
  @for (link of rootLinks(); track link.href) {
    <ng-container *ngTemplateOutlet="node; context: { $implicit: link, depth: 0 }" />
  }
</nav>

<ng-template #node let-link let-depth="depth">
  @if (docService.isExpandable(link)) {
    <div class="nav-group">
      @if (depth === 0) {
        <div class="nav-label">{{ link.title }}</div>
      } @else {
        <a
          class="nav-link nav-parent"
          [routerLink]="link.href"
          [class.active]="docService.isActive(link)"
          [style.paddingLeft.rem]="0.6 + depth * 0.75"
        >
          {{ link.title }}
        </a>
      }
      @for (child of link.children; track child.href) {
        <ng-container *ngTemplateOutlet="node; context: { $implicit: child, depth: depth + 1 }" />
      }
    </div>
  } @else {
    <a
      class="nav-link"
      [routerLink]="link.href"
      [class.active]="docService.isActive(link)"
      [style.paddingLeft.rem]="0.6 + depth * 0.75"
    >
      @if (link.icon; as icon) {
        <nge-doc-icon [icon]="icon" size="16px" />
      }
      <span>{{ link.title }}</span>
    </a>
  }
</ng-template>
