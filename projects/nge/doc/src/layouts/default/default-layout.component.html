<main>
  <aside class="sidebar" [class.opened]="sidebarOpened">
    <nge-doc-sidenav />
  </aside>
  <section>
    <nge-doc-header (toggle)="sidebarOpened = !sidebarOpened" />
    <article>
      <nge-doc-renderer #renderer />
      @if (showTableOfContents) {
        <aside [ngeDocToc]="renderer.componentRef"></aside>
      }
    </article>
  </section>
</main>
<nge-doc-footer />
