<div class="nge-doc-theme" [class.sidebar-collapsed]="sidebarCollapsed()">
  <nge-doc-header
    [collapsed]="sidebarCollapsed()"
    (toggleCollapse)="toggleCollapse()"
    (toggleSidebar)="toggleSidebar()"
    (openSearch)="openSearch()"
  />

  <div class="shell">
    <nge-doc-sidenav [class.open]="sidebarOpen()" />

    <main #main tabindex="-1">
      <div class="content">
        <nge-doc-breadcrumb />
        <nge-doc-renderer #renderer />
        <nge-doc-pager />
        <footer class="doc-footer">
          <span>Powered by</span>
          <a href="https://cisstech.github.io/nge/docs/nge-doc/" target="_blank" rel="noopener">ngedoc</a>
        </footer>
      </div>
    </main>

    <nge-doc-toc [renderer]="renderer" />
  </div>

  @if (sidebarOpen()) {
    <div class="backdrop" (click)="closeSidebar()"></div>
  }

  @if (searchOpen()) {
    <div class="nge-doc-search-overlay" (click)="closeSearch()">
      <nge-doc-search-palette (closed)="closeSearch()" (click)="$event.stopPropagation()" />
    </div>
  }
</div>
